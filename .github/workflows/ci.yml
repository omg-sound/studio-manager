name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # better-sqlite3는 optionalDependency(네이티브). 설치 실패해도 node:sqlite 폴백으로 테스트는 진행.
      - name: Install dependencies
        run: npm ci

      # 테스트: 금전 핵심(채번·VAT·Pro단가·세션겹침·권한) 격리 임시 DB. 의존성 0의 node:test.
      - name: Run tests
        run: npm test

      # CSS 빌드가 깨지지 않는지 확인(Tailwind CLI, badge opacity 등 빌드 함정 회귀 방지).
      - name: Build CSS
        run: npm run build:css
